<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.name }}</title>

    <style>
        .trailer-container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback-message {
            text-align: center;
            color: red;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="trailer-container">

    <h1>{{ movie.name }}</h1>

    <img src="{{ movie.image.url }}" width="300">

    <p>{{ movie.description }}</p>

    {% if video_id %}

    <div class="video-wrapper">
        <iframe
             width="100%"
             height="500"
            loading="lazy"
            src="https://www.youtube.com/embed/{{ video_id }}?rel=0"
            title="YouTube video player"
            frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
            allowfullscreen>
        </iframe>
    </div>

    {% else %}

    <div class="fallback-message">
        Trailer unavailable
    </div>

    {% endif %}
    <div class="mt-4">

    <a
        href="{% url 'theater_list' movie.id %}"
        class="btn btn-primary"
    >
        Book Now
    </a>

</div>

</div>

</body>
</html>
